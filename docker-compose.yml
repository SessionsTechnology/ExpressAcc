services:
  routioneer:
    build: .
    image: routioneer:demo
    environment:
      TZ: ${TZ:-America/Chicago}
      DATABASE_FILE: /data/db.json
      DEMO_MODE: "true"
      DEMO_RESET_MINUTES: ${DEMO_RESET_MINUTES:-15}
      DEMO_ADMIN_PASSWORD: ${DEMO_ADMIN_PASSWORD:-demo-admin}
    ports:
      - "${DEMO_PORT:-3002}:3001"
    volumes:
      - routioneer-demo-data:/data
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    stop_grace_period: 15s

volumes:
  routioneer-demo-data:
