services:
  routioneer:
    image: ghcr.io/sessionstechnology/routioneer:latest
    pull_policy: always
    environment:
      TZ: ${TZ:-America/Chicago}
      DATABASE_FILE: /data/db.json
    ports:
      - "${PORT:-3001}:3001"
    volumes:
      # Keep the legacy key so upgrades continue mounting existing data.
      - express-acc-data:/data
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    stop_grace_period: 15s

volumes:
  express-acc-data:
